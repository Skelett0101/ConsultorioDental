<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Horarios - Clínica Dental</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <div class="header-title-container">
                <i class="fa-solid fa-user-doctor header-icon"></i>
                <div class="header-text">
                    <h2>Registrar en Clínica</h2>
                    <p>Ingreso manual por personal autorizado</p>
                </div>
            </div>
            <button class="close-modal">&times;</button>
        </div>

        <form id="horarioForm">
            <div class="modal-body">
                
                <div class="input-section">
                    <div class="input-group">
                        <label>NOMBRE DEL DENTISTA</label>
                        <input type="text" name="dentista_nombre" placeholder="Ingrese nombre completo" required>
                    </div>
                </div>

                <div class="divider"><span>HORARIOS SEMANALES</span></div>

                <table class="horario-table">
                    <thead>
                        <tr>
                            <th>DÍA</th>
                            <th>ESTADO</th>
                            <th>HORA INICIO</th>
                            <th>HORA FIN</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="horarioBody">
                        <script>
                            const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
                            dias.forEach((dia, index) => {
                                const isWeekend = index >= 5;
                                document.write(`
                                    <tr class="${isWeekend ? 'weekend-row' : ''}">
                                        <td class="day-cell"><strong>${dia.toUpperCase()}</strong></td>
                                        <td class="status-cell">
                                            <label class="switch">
                                                <input type="checkbox" name="activo_${dia}" ${isWeekend ? '' : 'checked'} onchange="toggleDia(this)">
                                                <span class="slider round"></span>
                                            </label>
                                            <span class="status-label">${isWeekend ? 'CERRADO' : 'ABIERTO'}</span>
                                        </td>
                                        <td><input type="time" name="inicio_${dia}" class="time-input" value="09:00" ${isWeekend ? 'disabled' : ''}></td>
                                        <td><input type="time" name="fin_${dia}" class="time-input" value="18:00" ${isWeekend ? 'disabled' : ''}></td>
                                    </tr>
                                `);
                            });
                        </script>
                    </tbody>
                </table>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancel">Cancelar</button>
                <button type="submit" class="btn-save">
                    Dar de Alta <i class="fa-solid fa-user-plus"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
