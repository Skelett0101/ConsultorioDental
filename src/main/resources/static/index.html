<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Consultorio</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; text-align: center; }
        .container { max-width: 300px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        input, button { width: 90%; padding: 10px; margin: 10px 0; }
        #mensaje { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Iniciar Sesión</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Correo" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>

        <p id="mensaje"></p>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
